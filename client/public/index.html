<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#185fa5" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TollSync" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- General -->
    <meta name="description" content="Rental toll calculator for Turo hosts" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <title>TollSync</title>

    <!-- Google Analytics (GA4) — injected only when REACT_APP_GA_ID is set -->
    <script>
      (function() {
        var id = '%REACT_APP_GA_ID%';
        if (!id || id === '%REACT_APP_GA_ID%') return;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', id);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
