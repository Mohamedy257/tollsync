<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#185fa5"/>
  <!-- Road (white dashes) -->
  <rect x="236" y="80" width="40" height="80" rx="8" fill="white" opacity="0.3"/>
  <rect x="236" y="216" width="40" height="80" rx="8" fill="white" opacity="0.3"/>
  <rect x="236" y="352" width="40" height="80" rx="8" fill="white" opacity="0.3"/>
